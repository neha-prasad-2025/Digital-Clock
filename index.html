<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="main-box">
        <div id="dark-mode"><img src="assets/moon.png" alt="dark mode" /></div>
        <div class="wrapper">
          <div class="box ">
            <div id="hrs"></div>
            <span>Hours</span>
          </div>
          <span class="middle-span">:</span>
          <div class="box">
            <div id="mins"></div>
            <span>Minutes</span>
          </div>
          <span class="middle-span">:</span>
          <div class="box">
            <div id="secs"></div>
            <span>Seconds</span>
          </div>
          <div class="am-pm"></div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
